name: Sprint Start Automation

on:
  # Edit cron as needed. GitHub cron uses UTC.
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sprint-start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create issues, assign users, add to Project
        env:
          GH_AUTOMATION_TOKEN: ${{ secrets.GH_AUTOMATION_TOKEN }}
        run: python scripts/sprint_start.py
