name: Sprint End Automation

on:
  # Edit cron as needed. GitHub cron uses UTC.
  schedule:
    - cron: '0 22 * * 5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sprint-end:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate sprint report
        env:
          GH_AUTOMATION_TOKEN: ${{ secrets.GH_AUTOMATION_TOKEN }}
        run: python scripts/sprint_end.py

      - name: Upload sprint report
        uses: actions/upload-artifact@v4
        with:
          name: sprint-report
          path: sprint-report.md
